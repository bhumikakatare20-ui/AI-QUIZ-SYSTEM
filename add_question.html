<!DOCTYPE html>
<html>
<head>

<title>Add Question</title>
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h2>Add Question</h2>

<form method="post">

<select name="level">

<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>

</select>

<br><br>

<input name="question" placeholder="Question" required>

<br><br>

<input name="op1" placeholder="Option 1" required>
<input name="op2" placeholder="Option 2" required>

<br><br>

<input name="op3" placeholder="Option 3" required>
<input name="op4" placeholder="Option 4" required>

<br><br>

<input name="answer" placeholder="Correct Answer" required>

<br><br>

<button type="submit">Add</button>

</form>

</div>

</body>
</html>
